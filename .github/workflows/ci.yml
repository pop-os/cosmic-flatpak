name: CI

on:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: build-changed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update
          sudo apt-get install just
          just ubuntu-deps
          just build-changed
      - uses: actions/upload-artifact@v4
        with:
          path: log
